<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel alumnos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Panel Alumnos</h1>
    </header>

    <main>
        <section class="alumnos">
            <article class="column" id="all"> 
                <h2>Alumnos</h2>
                <ul id="listaAll" class="lista">
                    <li draggable="true" class="alumno">Pepito Martínez (32)</li>
                </ul>
            </article>
            <article class="column" id="selecteds">
                <h2>Seleccionados</h2>
                <ul id="listaSelected" class="lista"></ul>
            </article>
        </section>
        <section class="control">
            <button class="btn">Nuevo</button>
            <button class="btn">Enviar</button>
        </section>
        <section id="formulario"></section>

        <!-- Custom Modal for summaries -->
        <div id="modalSummary" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Confirmación de Envío</h3>
                    <button id="closeModal" class="btn-close">&times;</button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage"></p>
                    <ul id="modalList" class="modal-list"></ul>
                </div>
                <div class="modal-footer">
                    <button id="confirmBtn" class="btn btn-save">Aceptar</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Andrés José Cortés Díaz. DWECL. 2026</p>
    </footer>
</body>
</html>
