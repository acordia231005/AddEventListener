<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Alumnos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <span style="font-size:2rem;">🎓</span>
    <h1>Gestión de Alumnos</h1>
  </header>

  <main>
    <div class="columnas">

      <div class="columna" id="disponibles">
        <h2>Disponibles</h2>
        <button onclick="añadirAlumno()">+ Añadir alumno</button>
      </div>

      <div class="columna" id="seleccionados">
        <h2>Seleccionados</h2>
        <button id="btn-enviar" onclick="enviar()">Enviar selección</button>
      </div>

    </div>
  </main>

  <footer>
    <p>© 2026 Sistema de Selección de Alumnos</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
